[workspace]
# Root Cargo package (the engine crate) + the Tauri desktop app.
# The engine is also the workspace root's own package for historical
# compatibility with scripts that assume `cargo build` at the repo root
# produces the REPL binary.
members = [".", "desktop/src-tauri"]
resolver = "3"

[package]
name = "sqlrite"
version = "0.1.0"
authors = ["Joao Henrique Machado Silva <joaoh82@gmail.com>"]
edition = "2024"
rust-version = "1.85"
description = "Light version of SQLite developed with Rust"
repository = "https://github.com/joaoh82/rust_sqlite"
license = "MIT"


# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

# Library target — the engine. Used by the REPL binary below, by tests, and
# by the Tauri desktop app under `desktop/src-tauri/`. Keep the lib's public
# surface small (see `src/lib.rs`); the internals are versioned with
# on-disk format changes, so consumers should stick to the re-exports.
[lib]
name = "sqlrite"
path = "src/lib.rs"

# Binary target — the interactive REPL. This is what `cargo run` builds by
# default.
[[bin]]
name = "sqlrite"
path = "src/main.rs"

[dependencies]
# CLI
rustyline = "18.0"
rustyline-derive = "0.12"
log = "0.4"
env_logger = "0.11"
clap = { version = "4.6", features = ["cargo"] }

# Engine
sqlparser = "0.61"
thiserror = "2.0"
prettytable-rs = "0.10"
